windowrule {
    name = floating-steam
    match:class = ^steam$

    float = true
}

windowrule {
    name = non-floating-steam
    match:class = ^steam$
    match:title = ^Steam$
    workspace = 4 silent

    tile = true
}

windowrule {
    name = steam-login
    match:class = ^steam$
    match:title = ^Sign in to Steam$
    workspace = 4 silent
}
